#
# Block access to WordPress core, plugin, and theme files.
#
# VERSION       :4.0.0
# PERMISSION    :0644
# LOCATION      :/etc/apache2/conf-available/wordpress.inc.conf
# VARIABLE      :DOCUMENT_ROOT
# VARIABLE      :WORDPRESS_ROOT
# VARIABLE      :WORDPRESS_ROOT_URL

# Hungarian root files (no end anchor)
# - licenc.txt
# - olvasdel.html
<LocationMatch "^${WORDPRESS_ROOT_URL}(licenc\.txt|olvasdel\.html)">
    Require all denied
</LocationMatch>

# Readme, changelog, and license files (no anchors)
<LocationMatch "(?i)(readme\.txt|readme\.html|readme\.md|changelog\.txt|license\.txt)">
    Require all denied
</LocationMatch>

# PHP allowlist
<Directory "${DOCUMENT_ROOT}">
    <FilesMatch "(?i:\.php)$">
        <RequireAny>
            # Public site
            Require expr "%{REQUEST_FILENAME} in { \
                '${DOCUMENT_ROOT}/index.php', \
                '${WORDPRESS_ROOT}/wp-comments-post.php' \
            }"

            # Admin
            Require expr "%{REQUEST_FILENAME} in { \
                '${WORDPRESS_ROOT}/wp-login.php', \
                '${WORDPRESS_ROOT}/wp-admin/admin-ajax.php', \
                '${WORDPRESS_ROOT}/wp-admin/admin-post.php', \
                '${WORDPRESS_ROOT}/wp-admin/admin.php', \
                '${WORDPRESS_ROOT}/wp-admin/async-upload.php', \
                '${WORDPRESS_ROOT}/wp-admin/authorize-application.php', \
                '${WORDPRESS_ROOT}/wp-admin/comment.php', \
                '${WORDPRESS_ROOT}/wp-admin/customize.php', \
                '${WORDPRESS_ROOT}/wp-admin/edit-comments.php', \
                '${WORDPRESS_ROOT}/wp-admin/edit-tags.php', \
                '${WORDPRESS_ROOT}/wp-admin/edit.php', \
                '${WORDPRESS_ROOT}/wp-admin/erase-personal-data.php', \
                '${WORDPRESS_ROOT}/wp-admin/export-personal-data.php', \
                '${WORDPRESS_ROOT}/wp-admin/export.php', \
                '${WORDPRESS_ROOT}/wp-admin/font-library.php', \
                '${WORDPRESS_ROOT}/wp-admin/import.php', \
                '${WORDPRESS_ROOT}/wp-admin/index.php', \
                '${WORDPRESS_ROOT}/wp-admin/load-scripts.php', \
                '${WORDPRESS_ROOT}/wp-admin/load-styles.php', \
                '${WORDPRESS_ROOT}/wp-admin/media-new.php', \
                '${WORDPRESS_ROOT}/wp-admin/media-upload.php', \
                '${WORDPRESS_ROOT}/wp-admin/nav-menus.php', \
                '${WORDPRESS_ROOT}/wp-admin/options-connectors.php', \
                '${WORDPRESS_ROOT}/wp-admin/options-discussion.php', \
                '${WORDPRESS_ROOT}/wp-admin/options-general.php', \
                '${WORDPRESS_ROOT}/wp-admin/options-media.php', \
                '${WORDPRESS_ROOT}/wp-admin/options-permalink.php', \
                '${WORDPRESS_ROOT}/wp-admin/options-privacy.php', \
                '${WORDPRESS_ROOT}/wp-admin/options-reading.php', \
                '${WORDPRESS_ROOT}/wp-admin/options-writing.php', \
                '${WORDPRESS_ROOT}/wp-admin/options.php', \
                '${WORDPRESS_ROOT}/wp-admin/plugin-install.php', \
                '${WORDPRESS_ROOT}/wp-admin/plugins.php', \
                '${WORDPRESS_ROOT}/wp-admin/post-new.php', \
                '${WORDPRESS_ROOT}/wp-admin/post.php', \
                '${WORDPRESS_ROOT}/wp-admin/profile.php', \
                '${WORDPRESS_ROOT}/wp-admin/privacy-policy-guide.php', \
                '${WORDPRESS_ROOT}/wp-admin/privacy.php', \
                '${WORDPRESS_ROOT}/wp-admin/revision.php', \
                '${WORDPRESS_ROOT}/wp-admin/site-editor.php', \
                '${WORDPRESS_ROOT}/wp-admin/site-health.php', \
                '${WORDPRESS_ROOT}/wp-admin/term.php', \
                '${WORDPRESS_ROOT}/wp-admin/theme-install.php', \
                '${WORDPRESS_ROOT}/wp-admin/themes.php', \
                '${WORDPRESS_ROOT}/wp-admin/tools.php', \
                '${WORDPRESS_ROOT}/wp-admin/update-core.php', \
                '${WORDPRESS_ROOT}/wp-admin/update.php', \
                '${WORDPRESS_ROOT}/wp-admin/upgrade.php', \
                '${WORDPRESS_ROOT}/wp-admin/upload.php', \
                '${WORDPRESS_ROOT}/wp-admin/user-edit.php', \
                '${WORDPRESS_ROOT}/wp-admin/user-new.php', \
                '${WORDPRESS_ROOT}/wp-admin/users.php', \
                '${WORDPRESS_ROOT}/wp-admin/widgets.php' \
            }"

            # WordPress info pages
            # https://github.com/szepeviktor/wordpress-website-lifecycle/blob/master/mu-plugins/_core-debrand-wordpress.php
            # Require expr "%{REQUEST_FILENAME} in { \
            #     '${WORDPRESS_ROOT}/wp-admin/about.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/contribute.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/credits.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/freedoms.php' \
            # }"

            # Multisite
            # Require expr "%{REQUEST_FILENAME} in { \
            #     '${WORDPRESS_ROOT}/wp-activate.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/ms-delete-site.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/my-sites.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/about.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/admin.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/contribute.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/credits.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/edit.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/freedoms.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/index.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/plugin-editor.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/plugin-install.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/plugins.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/privacy.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/profile.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/settings.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/setup.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/site-info.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/site-new.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/site-settings.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/site-themes.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/site-users.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/sites.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/theme-editor.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/theme-install.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/themes.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/update-core.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/update.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/upgrade.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/user-edit.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/user-new.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/network/users.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/user/about.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/user/admin.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/user/contribute.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/user/credits.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/user/freedoms.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/user/index.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/user/privacy.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/user/profile.php', \
            #     '${WORDPRESS_ROOT}/wp-admin/user/user-edit.php', \
            #     '${WORDPRESS_ROOT}/wp-includes/ms-files.php', \
            #     '${WORDPRESS_ROOT}/wp-signup.php' \
            # }"
        </RequireAny>
    </FilesMatch>

    RewriteEngine On
    # Apply parent rules after these rules.
    RewriteOptions Inherit

    # Block the schema search placeholder.
    RewriteCond "%{QUERY_STRING}" "=s={search_term_string}"
    RewriteRule "^" - [R=400,END]

    # Add trailing slashes for some crawlers.
    RewriteCond %{HTTP_USER_AGENT} "(MJ12bot|DomainCrawler|GrapeshotCrawler|PetalBot|VelenPublicWebCrawler)"
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteRule "^([^.]*[^/.])$" "/$1/" [R=permanent,L]

#    # WP-CONTENT is the document root.
#    # Hide the real directory (no anchors).
#    RewriteCond %{REQUEST_URI} "/wordpress-core"
#    RewriteRule "^" - [R=400,END]
#    # Avoid a wp-admin redirect loop.
#    RewriteRule "^wp-admin$" "/wp-admin/" [R=permanent,END]
#    RewriteRule "^wp-admin/$" "/wordpress-core/wp-admin/index.php" [END]
#    # Treat all "wp-" files as core files.
#    RewriteCond %{REQUEST_FILENAME} !-f
#    RewriteCond %{REQUEST_FILENAME}%{PATH_INFO} "^(.+/)(wp-.+/wp-.+)$" [OR]
#    RewriteCond %{REQUEST_FILENAME}%{PATH_INFO} "^(.+/)(wp-.+)$" [OR]
#    RewriteCond %{REQUEST_FILENAME}%{PATH_INFO} "^(.+/)(xmlrpc\.php)$"
#    RewriteCond "%1wordpress-core/%2" -f
#    # XML-RPC has no "wp-" prefix.
#    RewriteRule "^(xmlrpc\.php|wp-.+)$" "/wordpress-core/$1" [END]

    # Handle core permalinks (no leading slash).
    RewriteRule "^index\.php$" - [END]
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule "^" "/index.php" [END]
</Directory>
